spring:
  application:
    name: team1-backend-notification

  datasource:
    # Docker: SPRING_DATASOURCE_URL 환경변수로 주입 (notification-db:3306)
    # 로컬 직접 실행: 기본값 localhost:3307 사용
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3307/notification_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:temp_password}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      # create → update: 재시작해도 기존 데이터 유지
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    # Docker: SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    # 로컬 직접 실행: localhost:9094 (Kafka 외부 리스너)
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: ${NOTIFICATION_KAFKA_CONSUMER_GROUP_ID:notification-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  data:
    redis:
      # Docker: SPRING_DATA_REDIS_HOST=redis
      # 로컬 직접 실행: localhost
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 3000ms

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

notification:
  sse:
    timeout: ${NOTIFICATION_SSE_TIMEOUT:1800000}
    # heartbeat 전송 주기 (ms). event-source-polyfill 타임아웃(45초)보다 짧게 유지해야 한다.
    heartbeat-interval: ${NOTIFICATION_SSE_HEARTBEAT_INTERVAL:30000}

member:
  service:
    # Docker: MEMBER_SERVICE_URL=http://member-service:8080
    # 로컬 직접 실행: localhost:8081
    url: ${MEMBER_SERVICE_URL:http://localhost:8081}
