spring.application.name=team1-backend-notification

# =============================================
# 서버 포트 설정
# 다른 서비스와 포트가 겹치지 않도록 지정
# member:8081, order:8082, wms:8083, integration:8084, notification:8085
# =============================================
server.port=8085

# =============================================
# 데이터베이스 설정
# 실제 환경에 맞게 값을 변경해야 합니다
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/conk_notification?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 설정
# ddl-auto=none: DDL(CREATE TABLE 등)을 Spring이 자동 실행하지 않음
# 테이블은 이미 제공된 DDL로 직접 생성했다고 가정
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Kafka Consumer 설정
# =============================================

# Kafka 브로커 주소 (여러 개일 경우 쉼표로 구분: host1:9092,host2:9092)
spring.kafka.bootstrap-servers=localhost:9092

# Consumer Group ID
# 같은 group-id를 가진 consumer들은 하나의 그룹으로 동작 (파티션을 나눠서 처리)
# notification-service의 경우 단독으로 모든 메시지를 소비해야 하므로 고유한 그룹명 사용
spring.kafka.consumer.group-id=notification-group

# auto-offset-reset: consumer가 처음 시작하거나 offset이 없을 때 어디서부터 읽을지 결정
# earliest: 토픽의 가장 처음 메시지부터 읽음 (놓친 메시지 없이 모두 처리)
# latest: consumer 실행 이후 새로 들어오는 메시지만 읽음
spring.kafka.consumer.auto-offset-reset=earliest

# key/value 역직렬화 설정
# Kafka 메시지의 key와 value는 bytes 형태 → Java 타입으로 변환이 필요
# key: String (메시지 식별자)
# value: String (JSON 문자열) → 코드에서 ObjectMapper로 직접 변환
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# =============================================
# Redis 설정
# =============================================

# Redis 서버 주소 (기본 포트: 6379)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Redis 비밀번호 (설정하지 않은 경우 빈 값으로 두면 됨)
# spring.data.redis.password=

# Redis 연결 풀 설정 (Lettuce 클라이언트 기본 사용)
# connection-timeout: Redis 서버에 연결 시도 최대 대기 시간 (밀리초)
spring.data.redis.timeout=3000ms

# =============================================
# SSE 설정
# =============================================

# SSE 연결 유지 시간 (밀리초)
# 30분 = 1,800,000ms. 이 시간이 지나면 클라이언트가 재연결 시도
notification.sse.timeout=1800000

# =============================================
# 외부 서비스 URL 설정
# ASN_CREATED, ORDER_REGISTERED 이벤트 수신 시
# 알림 수신 대상 계정을 member-service에 조회하기 위한 URL
# =============================================
member.service.url=http://localhost:8081
